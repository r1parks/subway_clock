<!DOCTYPE html>
<html>
<head>
    <title>Subway Clock Debug</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
        }
        h2 {
            border-bottom: 2px solid #0078D7;
            padding-bottom: 10px;
        }
        .log-container {
            margin-bottom: 40px;
        }
        .log-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
            color: #555;
        }
        .log-box {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            padding: 15px;
            border-radius: 8px;
            max-height: 350px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.4;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .refresh-button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #0078D7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 20px 0;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            -webkit-appearance: none;
        }
        .refresh-button:hover {
            background-color: #005a9e;
        }
        .nav-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #0078D7;
            font-weight: 500;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            body { padding: 15px; }
            .log-box { font-size: 11px; padding: 10px; }
        }
    </style>
</head>
<body>
    <a href="/" class="nav-link">&larr; Back to Settings</a>
    <h2>System Debug Logs</h2>
    
    <button class="refresh-button" onclick="window.location.reload();">Refresh Logs</button>

    {% for service, log_content in logs.items() %}
    <div class="log-container">
        <div class="log-title">{{ service }}</div>
        <div class="log-box">{{ log_content }}</div>
    </div>
    {% endfor %}

    <button class="refresh-button" onclick="window.location.reload();" style="margin-top: 0;">Refresh Logs</button>
    <br>
    <a href="/" class="nav-link" style="margin-top: 20px;">&larr; Back to Settings</a>
</body>
</html>
